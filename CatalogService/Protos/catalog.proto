syntax = "proto3";

option csharp_namespace = "CatalogService.Grpc";

package catalog;

service CatalogGrpc{
    rpc GetProductById(GetProductByIdRequest) returns (ProductResponse);
}

message GetProductByIdRequest{
    string id = 1;
}

message ProductResponse{
    string id = 1;
    string name = 2;
    double price = 3;
    bool found = 4;
    string description = 5;
}